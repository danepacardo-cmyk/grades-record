<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Students Average Record</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* Body & Background */
body {
    font-family: 'Quicksand', sans-serif;
    background: linear-gradient(135deg, #f3eaff, #e8d6ff);
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    overflow-x: auto;
}

/* Top-right name */
#userName {
    position: fixed;
    top: 20px;
    right: 20px;
    font-weight: 600;
    color: #8e24aa;
    z-index: 100;
    background: rgba(255,255,255,0.9);
    padding: 10px 20px;
    border-radius: 25px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

/* Title */
h1 {
    margin: 80px 0 30px 0;
    text-align: center;
    font-size: 28px;
    color: #6a1b9a;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
}

/* Container */
.container {
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 25px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.15);
    width: 95%;
    max-width: 1400px;
}

/* Inputs */
input[type="text"], input[type="number"], input[readonly] {
    width: 100%;
    padding: 12px 15px;
    margin: 8px 0;
    border: 2px solid #ddd;
    border-radius: 12px;
    font-size: 16px;
    box-sizing: border-box;
}
input[type="number"] {
    max-width: 120px;
}
input:focus {
    border-color: #8e24aa;
    outline: none;
    box-shadow: 0 0 10px rgba(142,36,170,0.2);
}
input[readonly] {
    background: #f8f5ff;
    font-weight: 600;
    color: #6a1b9a;
}

/* Labels */
label {
    font-weight: 600;
    color: #5e35b1;
    margin-top: 15px;
    display: block;
}

/* Buttons */
button {
    background: linear-gradient(135deg, #8e24aa, #b26aff);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    margin: 5px;
    transition: all 0.3s;
}
button:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(142,36,170,0.3);
}

/* Grade components */
.subject-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
    padding: 15px;
    background: rgba(248,245,255,0.8);
    border-radius: 12px;
    border-left: 4px solid #8e24aa;
}

/* Grade input container */
.grade-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 10px 0;
}

/* Grid Table */
.grid-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 25px;
    font-size: 14px;
}
.grid-table th, .grid-table td {
    border: 2px solid #d1b3ff;
    padding: 12px 8px;
    text-align: center;
}
.grid-table th {
    background: linear-gradient(135deg, #8e24aa, #ab47bc);
    color: white;
    font-weight: 600;
    position: sticky;
    top: 0;
}
.grid-table tr:hover {
    background: rgba(248,245,255,0.8);
}

.passed { color: #28a745; font-weight: bold; }
.failed { color: #dc3545; font-weight: bold; }
.final-grade {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff3cd, #ffeaa7);
}

/* Responsive */
@media (max-width: 768px) {
    .subject-row, .grade-row { flex-direction: column; align-items: stretch; }
    .grid-table { font-size: 12px; }
    .grid-table th, .grid-table td { padding: 8px 4px; }
}
</style>
</head>
<body>
<div id="userName">Mary Diane Pacardo - BSIT 3A</div>
<h1> Students Grade Record </h1>

<div class="container">
    <label>Course:</label>
    <input type="text" id="course" placeholder="Enter course" value="BSIT">
    
    <label>Section:</label>
    <input type="text" id="section" placeholder="Enter section" value="3A">

    <h3 style="margin-top: 25px;">📋 Grade Components</h3>
    <div id="subjects-container"></div>

    <h3 style="margin-top: 25px;">👤 Student Entry</h3>
    <label>Student Name:</label>
    <input type="text" id="studentName" placeholder="Enter student name">
    
    <div id="grades-container"></div>
    
    <label>🎯 Final Grade:</label>
    <input type="text" id="finalGrade" readonly>

    <div style="text-align: center; margin: 25px 0;">
        <button onclick="addStudent()">➕ Add Student</button>
        <button onclick="clearInputs()">🔄 Clear Form</button>
        <button onclick="clearAll()">🗑️ Clear All</button>
    </div>

    <table class="grid-table" id="studentTable">
        <thead><tr id="tableHeader"></tr></thead>
        <tbody id="studentTableBody"></tbody>
    </table>
</div>

<script>
let students = JSON.parse(localStorage.getItem('students')) || [];
const components = [
    {name: 'Quiz', weight: 0.20},
    {name: 'Laboratory', weight: 0.30},
    {name: 'Assignment', weight: 0.10},
    {name: 'Attendance', weight: 0.10},
    {name: 'Major Exam', weight: 0.30}
];

// Initialize
function init() {
    renderSubjects();
    renderGradeInputs();
    renderTable();
}
init();

// Render component labels
function renderSubjects() {
    const container = document.getElementById('subjects-container');
    container.innerHTML = '';
    components.forEach(comp => {
        const row = document.createElement('div');
        row.className = 'subject-row';
        row.innerHTML = `
            <strong style="min-width: 120px;">${comp.name}</strong>
            <span style="background:#28a745;color:white;padding:5px 10px;border-radius:8px;font-size:13px;font-weight:600;">
                ${(comp.weight*100).toFixed(0)}%
            </span>
            <span style="color:#666;">(Max: 100)</span>
        `;
        container.appendChild(row);
    });
}

// Render grade inputs (MAX 100)
function renderGradeInputs() {
    const container = document.getElementById('grades-container');
    container.innerHTML = '';
    components.forEach((comp, index) => {
        const row = document.createElement('div');
        row.className = 'grade-row';
        row.innerHTML = `
            <label style="flex: 1; margin: 0;">${comp.name}</label>
            <input type="number" class="grade-input" data-index="${index}" 
                   min="0" max="100" step="0.1" 
                   placeholder="0-100" style="font-weight:600;">
        `;
        container.appendChild(row);
    });
    
    // Add event listeners with max 100 enforcement
    document.querySelectorAll('.grade-input').forEach(input => {
        input.addEventListener('input', function() {
            // Force max 100
            if (this.value > 100) this.value = 100;
            if (this.value < 0) this.value = 0;
            updateFinalGrade();
        });
    });
}

// Update final grade
function updateFinalGrade() {
    let totalWeighted = 0;
    components.forEach((comp, index) => {
        const input = document.querySelector(`.grade-input[data-index="${index}"]`);
        const score = Math.min(100, Math.max(0, parseFloat(input.value) || 0)); // Clamp 0-100
        const weighted = (score / 100) * comp.weight * 100;
        totalWeighted += weighted;
        
        // Color code input
        input.style.color = score >= 75 ? '#28a745' : score > 0 ? '#dc3545' : '#666';
        input.style.fontWeight = score > 0 ? 'bold' : 'normal';
    });
    
    const finalGrade = Math.round(totalWeighted * 100) / 100;
    const finalInput = document.getElementById('finalGrade');
    finalInput.value = finalGrade.toFixed(2);
    
    // Color code final grade
    finalInput.style.color = finalGrade >= 75 ? '#28a745' : '#dc3545';
    finalInput.style.fontWeight = 'bold';
}

// Add student
function addStudent() {
    const name = document.getElementById('studentName').value.trim();
    if (!name) {
        alert('❌ Please enter student name!');
        return;
    }
    
    const grades = components.map((_, index) => {
        const input = document.querySelector(`.grade-input[data-index="${index}"]`);
        return Math.min(100, Math.max(0, parseFloat(input.value) || 0)); // Ensure 0-100
    });
    
    const finalGrade = parseFloat(document.getElementById('finalGrade').value);
    const status = finalGrade >= 75 ? 'PASSED' : 'FAILED';
    
    students.unshift({name, grades, finalGrade, status});
    localStorage.setItem('students', JSON.stringify(students));
    
    renderTable();
    clearInputs();
    alert(`✅ ${name} added! Final: ${finalGrade.toFixed(2)} (${status})`);
}

// Render table
function renderTable() {
    const header = document.getElementById('tableHeader');
    const tbody = document.getElementById('studentTableBody');
    
    // Header
    let headerHTML = '<th style="min-width: 150px;">Student Name</th>';
    components.forEach(comp => {
        headerHTML += `<th style="min-width: 110px;">${comp.name}<br><small>${(comp.weight*100).toFixed(0)}%</small></th>`;
    });
    headerHTML += '<th style="min-width: 120px;">Final Grade</th><th style="min-width: 100px;">Status</th>';
    header.innerHTML = headerHTML;
    
    // Body
    tbody.innerHTML = '';
    students.forEach((student, index) => {
        let rowHTML = `<td style="font-weight:600;background:#e8f5e8;">${student.name}</td>`;
        
        student.grades.forEach((grade) => {
            const status = grade >= 75 ? 'passed' : 'failed';
            rowHTML += `<td class="${status}">${grade.toFixed(1)}</td>`;
        });
        
        const finalStatus = student.finalGrade >= 75 ? 'passed final-grade' : 'failed final-grade';
        rowHTML += `<td class="${finalStatus}">${student.finalGrade.toFixed(2)}</td>`;
        rowHTML += `<td class="${finalStatus}">${student.status}</td>`;
        
        const row = document.createElement('tr');
        row.innerHTML = rowHTML;
        tbody.appendChild(row);
    });
}

// Clear form
function clearInputs() {
    document.getElementById('studentName').value = '';
    document.querySelectorAll('.grade-input').forEach(input => {
        input.value = '';
        input.style.color = '#666';
        input.style.fontWeight = 'normal';
    });
    document.getElementById('finalGrade').value = '';
}

// Clear all
function clearAll() {
    if (confirm('🗑️ Clear all student records?')) {
        students = [];
        localStorage.removeItem('students');
        renderTable();
    }
}
</script>
</body>
</html>
